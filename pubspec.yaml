name: codebuzzer
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.10.4 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  alarm: ^5.2.1
  flutter_local_notifications: ^21.0.0
  http: ^1.6.0
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  permission_handler: ^12.0.1
  google_fonts: ^8.0.2
  timezone: ^0.11.0
  file_picker: ^11.0.2
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  adaptive_icon_background: "assets/bg.png"
  adaptive_icon_foreground: "assets/foreground.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
  fonts:
    - family: GoogleSans
      fonts:
        - asset: assets/fonts/googlesans/GoogleSansDisplay-Regular.ttf
        - asset: assets/fonts/googlesans/GoogleSansDisplay-Bold.ttf
          weight: 700
